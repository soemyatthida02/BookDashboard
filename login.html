<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Login</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            /* Replace the URL below with your actual image path or a link */
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                              url('2026-02-22 11.06.58.jpg'); 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
        }

        .login-container { 
            /* Semi-transparent background for better look */
            background: rgba(255, 255, 255, 0.9); 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); 
            width: 320px; 
            backdrop-filter: blur(5px); /* Adds a nice blur effect */
        }

        h2 { text-align: center; color: #2c3e50; margin-bottom: 1.5rem; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box; 
            outline: none;
        }

        input:focus { border-color: #3498db; }

        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #2c3e50; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover { background-color: #1a252f; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Library Login</h2>
        <a href="home.html"></a>
        <form action="login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
