<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; }
        .sidebar { width: 200px; background: #2c3e50; color: white; height: 100vh; padding: 20px; }
        .main-content { flex-grow: 1; padding: 40px; background: #ecf0f1; }
        .card-container { display: flex; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; flex: 1; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>LMS Admin</h3>
        <p>Dashboard</p>
        <p>Manage Books</p>
        <p>Issued Books</p>
        <a href="login.html" style="color: #e74c3c;">Logout</a>
    </div>
    <div class="main-content">
        <h1>Welcome to the Library System</h1>
        <div class="card-container">
            <div class="card"><h3>1,240</h3><p>Total Books</p></div>
            <div class="card"><h3>45</h3><p>Books Issued</p></div>
            <div class="card"><h3>12</h3><p>Overdue</p></div>
        </div>
    </div>
</body>
</html>
