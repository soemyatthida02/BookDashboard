
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            background-color: #f4f7fe;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background-color: #1e293b;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            position: fixed;
            height: 100%;
        }

        .sidebar h3 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 24px;
            font-weight: 600;
            color: #3b82f6;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            padding: 5px 20px;
        }

        .sidebar li a {
            color: #cbd5e1;
            text-decoration: none;
            display: block;
            padding: 12px 15px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .sidebar li a:hover {
            background-color: #3b82f6;
            color: white;
            transform: translateX(5px);
        }

        /* Main Content Styling */
        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 40px;
        }

        header {
            margin-bottom: 30px;
        }

        header h1 {
            color: #1e293b;
            font-size: 28px;
        }

        header p {
            color: #64748b;
        }

        /* Cards Layout */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: left;
            border-bottom: 4px solid #3b82f6;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 5px;
        }

        .card p {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Table Section */
        .table-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .table-section h4 {
            margin-bottom: 15px;
            color: #1e293b;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>My Library</h3>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="member.html">Members</a></li>
            <li><a href="managebook.html">Manage Books</a></li>
            <li><a href="issuedbook.html">Issued Books</a></li>
            <li><a href="login.html">Logout</a></li>
        </ul>
    </div>

    <div class="main-content">
        <header>
            <h1>Library Dashboard</h1>
            <p>Welcome back, Admin!</p>
        </header>

        <div class="card-container">
            <div class="card" style="border-bottom-color: #3b82f6;">
                <h3>1,240</h3>
                <p>Total Books</p>


</div>
            <div class="card" style="border-bottom-color: #2ecc71;">
                <h3>45</h3>
                <p>Books Issued</p>
            </div>
            <div class="card" style="border-bottom-color: #e67e22;">
                <h3>12</h3>
                <p>Overdue Books</p>
            </div>
            <div class="card" style="border-bottom-color: #9b59b6;">
                <h3>850</h3>
                <p>Active Members</p>
            </div>
        </div>

        <div class="table-section">
            <h4>Recent Activities</h4>
            <p style="color: #95a5a6; font-style: italic;">No recent transactions today.</p>
        </div>
    </div>

</body>
</html>
